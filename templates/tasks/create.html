{% extends "base.html" %}
{% block title %}New Task - Afah{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-4"><i class="bi bi-plus-circle text-primary me-2"></i>New Task</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" placeholder="What needs to be done?" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="3" placeholder="Optional details..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Deadline <span class="text-danger">*</span></label>
            <input type="datetime-local" name="deadline" class="form-control" required id="deadlineInput">
          </div>
          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="form-label fw-semibold">Priority</label>
              <select name="priority" class="form-select">
                <option value="low">🟢 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Status</label>
              <select name="status" class="form-select">
                <option value="pending" selected>Pending</option>
                <option value="in_progress">In Progress</option>
              </select>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1">
              <i class="bi bi-plus-lg me-2"></i>Create Task
            </button>
            <a href="{{ url_for('tasks.index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Set minimum datetime to now
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('deadlineInput').min = now.toISOString().slice(0, 16);
</script>
{% endblock %}
