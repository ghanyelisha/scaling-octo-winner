{% extends "base.html" %}
{% block title %}Edit Task - Afah{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-4"><i class="bi bi-pencil-square text-primary me-2"></i>Edit Task</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" value="{{ task.title }}" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ task.description or '' }}</textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Deadline <span class="text-danger">*</span></label>
            <input type="datetime-local" name="deadline" class="form-control" value="{{ deadline_fmt }}" required>
          </div>
          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="form-label fw-semibold">Priority</label>
              <select name="priority" class="form-select">
                <option value="low" {% if task.priority=='low' %}selected{% endif %}>🟢 Low</option>
                <option value="medium" {% if task.priority=='medium' %}selected{% endif %}>🟡 Medium</option>
                <option value="high" {% if task.priority=='high' %}selected{% endif %}>🔴 High</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Status</label>
              <select name="status" class="form-select">
                <option value="pending" {% if task.status=='pending' %}selected{% endif %}>Pending</option>
                <option value="in_progress" {% if task.status=='in_progress' %}selected{% endif %}>In Progress</option>
                <option value="completed" {% if task.status=='completed' %}selected{% endif %}>Completed</option>
              </select>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1">
              <i class="bi bi-check-lg me-2"></i>Save Changes
            </button>
            <a href="{{ url_for('tasks.detail', task_id=task.id) }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
        <hr>
        <form method="POST" action="{{ url_for('tasks.delete', task_id=task.id) }}"
              onsubmit="return confirm('Permanently delete this task?')">
          <button class="btn btn-outline-danger w-100">
            <i class="bi bi-trash me-2"></i>Delete This Task
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
