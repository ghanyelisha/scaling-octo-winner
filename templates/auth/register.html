{% extends "base.html" %}
{% block title %}Register - Afah{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center fw-bold">
          <i class="bi bi-person-plus text-primary me-2"></i>Create Account
        </h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Choose a username" minlength="3" required autofocus>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" id="password" class="form-control" placeholder="At least 6 characters" minlength="6" required>
              <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('password','eye1')">
                <i class="bi bi-eye" id="eye1"></i>
              </button>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" name="confirm_password" id="confirm" class="form-control" placeholder="Repeat password" required>
              <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('confirm','eye2')">
                <i class="bi bi-eye" id="eye2"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-check me-2"></i>Register
          </button>
        </form>
        <hr>
        <p class="text-center mb-0 text-muted">
          Already have an account?
          <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Sign in here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd(fieldId, iconId) {
  const f = document.getElementById(fieldId);
  const i = document.getElementById(iconId);
  if (f.type === 'password') { f.type = 'text'; i.className = 'bi bi-eye-slash'; }
  else { f.type = 'password'; i.className = 'bi bi-eye'; }
}
</script>
{% endblock %}
