{% extends "base.html" %}
{% block title %}Login - Afah{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center fw-bold">
          <i class="bi bi-box-arrow-in-right text-primary me-2"></i>Sign In
        </h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Username or Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="identifier" class="form-control" placeholder="Enter username or email" required autofocus>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" id="password" class="form-control" placeholder="Enter password" required>
              <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" name="remember" class="form-check-input" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
          </button>
        </form>
        <hr>
        <p class="text-center mb-0 text-muted">
          Don't have an account?
          <a href="{{ url_for('auth.register') }}" class="text-decoration-none">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePassword() {
  const p = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (p.type === 'password') {
    p.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    p.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>
{% endblock %}
